name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Mono
        run: |
          sudo apt-get update
          sudo apt-get install -y mono-complete

      - name: Restore cached KSP reference assemblies
        id: cache-libs
        uses: actions/cache@v4
        with:
          path: libs/managed
          key: ksp-libs-${{ hashFiles('Kerpilot.csproj') }}

      - name: Check reference assemblies
        run: |
          if ls libs/managed/*.dll 1>/dev/null 2>&1; then
            echo "Found KSP reference assemblies in libs/managed/"
            ls libs/managed/
          else
            echo "::error::KSP reference assemblies not found (no cache hit and no libs/managed/ in repo)."
            echo "Run 'scripts/create-stubs.sh' locally and commit libs/managed/ to seed the cache."
            exit 1
          fi

      - name: Build
        run: dotnet build -c Release -p:KSPRoot=${{ github.workspace }}/libs -p:FrameworkPathOverride=/usr/lib/mono/4.7.2-api/

      - name: Test
        run: dotnet test tests/Kerpilot.Tests.csproj -c Release --no-build -p:FrameworkPathOverride=/usr/lib/mono/4.7.2-api/
