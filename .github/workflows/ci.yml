name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Mono
        run: |
          sudo apt-get update
          sudo apt-get install -y mono-complete

      - name: Build
        run: dotnet build -c Release -p:KSPRoot=${{ github.workspace }}/libs -p:FrameworkPathOverride=/usr/lib/mono/4.7.2-api/

      - name: Test
        run: dotnet test tests/Kerpilot.Tests.csproj -c Release --no-build -p:FrameworkPathOverride=/usr/lib/mono/4.7.2-api/
