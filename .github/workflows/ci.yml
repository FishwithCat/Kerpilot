name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Mono
        run: |
          sudo apt-get update
          sudo apt-get install -y mono-complete

      - name: Cache KSP reference assemblies
        id: cache-libs
        uses: actions/cache@v4
        with:
          path: libs/managed
          key: ksp-libs-${{ hashFiles('Kerpilot.csproj') }}

      - name: Check reference assemblies
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: |
          echo "::error::KSP reference assemblies not found in cache."
          echo "Run 'scripts/create-stubs.sh' locally and commit libs/managed/ to populate the cache."
          echo "See CONTRIBUTING.md for details."
          exit 1

      - name: Build
        run: dotnet build -c Release -p:KSPRoot=${{ github.workspace }}/libs
        env:
          FrameworkPathOverride: /usr/lib/mono/4.7.2-api/

      - name: Test
        run: dotnet test tests/Kerpilot.Tests.csproj -c Release --no-build
        env:
          FrameworkPathOverride: /usr/lib/mono/4.7.2-api/
